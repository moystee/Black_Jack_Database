<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- to add emojis -->
    <title>Blackjack Game</title>
    <link rel="stylesheet" href="../css/game.css">
</head>

<body>

    <h1>Blackjack Game</h1>

    <h2>Dealer</h2>

    <p>
        Dealer Hand:
        <span id="dealerHand"></span>
    </p>
    
    <p id="dealerScore">Dealer Score:</p>

    <hr>

    <h2>Player</h2>

    <p id="playerHandText">
        Player Hand:
        <span id="playerHand"></span>
    </p>
    
    <p id="playerScore">Player Score:</p>

    <div id="splitArea" hidden>
        <p>
            Player Hand 1: 
            <span id="splitHand1"></span>
        </p>
        <p id="splitScore1">Player Hand 1 Score:</p>
    
        <p>
            Player Hand 2: 
            <span id="splitHand2"></span>
        </p>
        <p id="splitScore2">Player Hand 2 Score:</p>
    </div>

    <hr>

    <button id="hitButton">Hit</button>

    <button id="standButton">Stand</button>

    <button id="splitButton" disabled>Split</button>

    <button id="exitButton">Exit</button>

    <p id="gameMessage">Game messages will appear here.</p>

    <div id="exitPopup" hidden>

        <h3>Exit Game?</h3>
    
        <p>Are you sure you want to leave this game?</p>
    
        <button id="saveExitButton">Save and Exit</button>
    
        <button id="nosaveExitButton">Exit Without Saving</button>
    
        <button id="cancelExitButton">Cancel</button>

    </div>

    <script src="../js/game.js"></script>

</body>
</html>
